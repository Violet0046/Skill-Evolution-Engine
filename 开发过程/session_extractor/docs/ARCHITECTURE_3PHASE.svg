<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#374151"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="30" font-size="20" font-weight="700" text-anchor="middle" fill="#1f2937">Skill Evolution Pipeline</text>
  <text x="480" y="52" font-size="11" text-anchor="middle" fill="#6b7280">从 session 数据到 agent 进化 · 3 阶段</text>

  <!-- ============== 阶段 1: 处理原始数据 ============== -->
  <rect x="40" y="90" width="880" height="170" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="60" y="115" font-size="16" font-weight="700" fill="#14532d">阶段 1 · 处理原始数据</text>
  <text x="60" y="135" font-size="10" fill="#166534">输入: session 数据 → 输出: 按"阶段 + skill"切分好的摘要</text>

  <rect x="60" y="160" width="200" height="80" rx="5" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="160" y="180" font-size="12" font-weight="600" text-anchor="middle" fill="#14532d">a. 分类</text>
  <text x="160" y="200" font-size="9.5" text-anchor="middle" fill="#166534">按 entry 类型</text>
  <text x="160" y="215" font-size="9.5" text-anchor="middle" fill="#166534">标 entry_class</text>
  <text x="160" y="229" font-size="9.5" text-anchor="middle" fill="#166534">+ 细分</text>

  <line x1="260" y1="200" x2="290" y2="200" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="290" y="160" width="200" height="80" rx="5" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="390" y="180" font-size="12" font-weight="600" text-anchor="middle" fill="#14532d">b. 过滤</text>
  <text x="390" y="200" font-size="9.5" text-anchor="middle" fill="#166534">按黑名单</text>
  <text x="390" y="215" font-size="9.5" text-anchor="middle" fill="#166534">drop 冗余字段</text>
  <text x="390" y="229" font-size="9.5" text-anchor="middle" fill="#166534">精简 entry</text>

  <line x1="490" y1="200" x2="520" y2="200" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="520" y="160" width="200" height="80" rx="5" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="620" y="180" font-size="12" font-weight="600" text-anchor="middle" fill="#14532d">c. 元信息</text>
  <text x="620" y="200" font-size="9.5" text-anchor="middle" fill="#166534">hook → phase</text>
  <text x="620" y="215" font-size="9.5" text-anchor="middle" fill="#166534">exitCode → 拒答</text>
  <text x="620" y="229" font-size="9.5" text-anchor="middle" fill="#166534">提取硬约束信号</text>

  <line x1="720" y1="200" x2="750" y2="200" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="750" y="155" width="160" height="90" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="830" y="175" font-size="12" font-weight="600" text-anchor="middle" fill="#92400e">d. 阶段切分</text>
  <text x="830" y="195" font-size="9.5" text-anchor="middle" fill="#78350f">按 phase + skill</text>
  <text x="830" y="210" font-size="9.5" text-anchor="middle" fill="#78350f">划分 session</text>
  <text x="830" y="229" font-size="9" font-style="italic" text-anchor="middle" fill="#92400e">（核心环节）</text>

  <line x1="480" y1="260" x2="480" y2="300" stroke="#374151" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ============== 阶段 2: 分析聚类 ============== -->
  <rect x="40" y="300" width="880" height="170" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="60" y="325" font-size="16" font-weight="700" fill="#1e3a8a">阶段 2 · 分析聚类</text>
  <text x="60" y="345" font-size="10" fill="#1e40af">输入: 多个 session 的切分摘要 → 输出: 失败模式聚类 + 归因到具体规则</text>

  <rect x="60" y="370" width="270" height="80" rx="5" fill="#ffffff" stroke="#1d4ed8" stroke-width="1"/>
  <text x="195" y="390" font-size="12" font-weight="600" text-anchor="middle" fill="#1e3a8a">a. 跨 session 统计</text>
  <text x="195" y="410" font-size="9.5" text-anchor="middle" fill="#1e40af">按 phase 失败率</text>
  <text x="195" y="425" font-size="9.5" text-anchor="middle" fill="#1e40af">按 gate_script 拒答热点</text>
  <text x="195" y="439" font-size="9.5" text-anchor="middle" fill="#1e40af">按 skill 调用频次</text>

  <line x1="330" y1="410" x2="360" y2="410" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="360" y="370" width="270" height="80" rx="5" fill="#ffffff" stroke="#1d4ed8" stroke-width="1"/>
  <text x="495" y="390" font-size="12" font-weight="600" text-anchor="middle" fill="#1e3a8a">b. 失败模式聚类</text>
  <text x="495" y="410" font-size="9.5" text-anchor="middle" fill="#1e40af">LLM 找"反复失败"</text>
  <text x="495" y="425" font-size="9.5" text-anchor="middle" fill="#1e40af">同 phase + 同 skill</text>
  <text x="495" y="439" font-size="9.5" text-anchor="middle" fill="#1e40af">+ 多次失败</text>

  <line x1="630" y1="410" x2="660" y2="410" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="660" y="370" width="240" height="80" rx="5" fill="#ffffff" stroke="#1d4ed8" stroke-width="1"/>
  <text x="780" y="390" font-size="12" font-weight="600" text-anchor="middle" fill="#1e3a8a">c. 归因</text>
  <text x="780" y="410" font-size="9.5" text-anchor="middle" fill="#1e40af">模式 → 具体规则</text>
  <text x="780" y="425" font-size="9.5" text-anchor="middle" fill="#1e40af">CLAUDE.md / *.mjs</text>
  <text x="780" y="439" font-size="9.5" text-anchor="middle" fill="#1e40af">/ agents / skills</text>

  <line x1="480" y1="470" x2="480" y2="510" stroke="#374151" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ============== 阶段 3: 进化 ============== -->
  <rect x="40" y="510" width="880" height="170" rx="10" fill="#fed7aa" stroke="#ea580c" stroke-width="2.5"/>
  <text x="60" y="535" font-size="16" font-weight="700" fill="#7c2d12">阶段 3 · 进化</text>
  <text x="60" y="555" font-size="10" fill="#9a3412">输入: 失败模式 + 归因 → 输出: 修复 patch 应用到 5 层硬约束</text>

  <rect x="60" y="580" width="270" height="80" rx="5" fill="#ffffff" stroke="#ea580c" stroke-width="1"/>
  <text x="195" y="600" font-size="12" font-weight="600" text-anchor="middle" fill="#7c2d12">a. 分析 LLM</text>
  <text x="195" y="620" font-size="9.5" text-anchor="middle" fill="#9a3412">总结失败模式</text>
  <text x="195" y="635" font-size="9.5" text-anchor="middle" fill="#9a3412">提出修复方向</text>
  <text x="195" y="649" font-size="9.5" text-anchor="middle" fill="#9a3412">（L1 agent）</text>

  <line x1="330" y1="620" x2="360" y2="620" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="360" y="580" width="270" height="80" rx="5" fill="#ffffff" stroke="#ea580c" stroke-width="1"/>
  <text x="495" y="600" font-size="12" font-weight="600" text-anchor="middle" fill="#7c2d12">b. 进化 LLM</text>
  <text x="495" y="620" font-size="9.5" text-anchor="middle" fill="#9a3412">生成修复 patch</text>
  <text x="495" y="635" font-size="9.5" text-anchor="middle" fill="#9a3412">（diff 格式）</text>
  <text x="495" y="649" font-size="9.5" text-anchor="middle" fill="#9a3412">（L2 agent）</text>

  <line x1="630" y1="620" x2="660" y2="620" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="660" y="580" width="240" height="80" rx="5" fill="#ffffff" stroke="#ea580c" stroke-width="1"/>
  <text x="780" y="600" font-size="12" font-weight="600" text-anchor="middle" fill="#7c2d12">c. 应用 patch</text>
  <text x="780" y="620" font-size="9.5" text-anchor="middle" fill="#9a3412">5 层硬约束：</text>
  <text x="780" y="635" font-size="9.5" text-anchor="middle" fill="#9a3412">CLAUDE.md / phases/</text>
  <text x="780" y="649" font-size="9.5" text-anchor="middle" fill="#9a3412">hooks / agents / skills</text>

  <!-- 反馈回路 -->
  <path d="M 780 660 L 780 690 L 195 690 L 195 660" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arr-purple)"/>
  <text x="487" y="706" font-size="10" font-style="italic" fill="#6b21a8" text-anchor="middle">feedback loop: 跑同 session 验证修复</text>

</svg>
