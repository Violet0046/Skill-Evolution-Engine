constraints:
  - layer: CLAUDE.md
    rule: "所有阶段工具调用前必须先执行初始化 skill"
    detector: gate
  - layer: commands
    rule: "phase 转移必须通过 phaseN-pre-* hook 触发"
    detector: state_machine
  - layer: hooks
    rule: "*-gate.mjs 拒答时 exitCode 必须为 2 且 stderr 含 [script-name] 前缀"
    detector: gate
  - layer: skills
    rule: "查询类技能必须在初始化之后调用"
    detector: gate
  - layer: subagents
    rule: "review-agent 必须返回 passed/retryAdvice 字段"
    detector: review_contract